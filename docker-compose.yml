version: '3.8'

services:
  app:
    build: .
    ports:
      - "8006:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - default

  redis:
    image: redis:alpine
    ports:
      - "6379"
    networks:
      - default

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672"
      - "15672"
    networks:
      - default

networks:
  default:
    name: ustbite-ustbite-notification-service-network
